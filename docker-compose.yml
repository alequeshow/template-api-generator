version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: template_api_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_LOCAL_PASSWORD}
      MONGO_INITDB_DATABASE: template_api_db
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d    
volumes:
  mongodb_data: